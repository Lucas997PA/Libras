<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modos de Jogo - Libras</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body class="dark-mode">
  
  <div class="top-bar-modo-jogo">
    <a href="../index.html" class="btn-voltar">🔙 Voltar ao Menu Principal</a>
  </div>

  <div class="modo-jogo-container">
    <h1 class="modo-titulo">Modos de Jogo - Libras</h1>
    <p class="modo-subtitulo">Escolha uma categoria para aprender brincando:</p>

    <div class="botoes-fases-grid">
      <a href="alfabeto.html" class="fase-card">
        <img src="../Imagens/Img_Dos_Botão/alfabeto.png" alt="Fase Alfabeto" class="fase-image">
        <div class="fase-title">Alfabeto em Libras</div>
        <div class="fase-count">26 questões</div>
      </a>

      <a href="numeros.html" class="fase-card">
        <img src="../Imagens/Img_Dos_Botão/numero.png" alt="Fase Números" class="fase-image">
        <div class="fase-title">Números em Libras</div>
        <div class="fase-count">11 questões</div>
      </a>

      <a href="cores.html" class="fase-card">
        <img src="../Imagens/Img_Dos_Botão/cores.png" alt="Fase Cores" class="fase-image">
        <div class="fase-title">Cores em Libras</div>
        <div class="fase-count">10 questões</div>
      </a>

      <a href="familia.html" class="fase-card">
        <img src="../Imagens/Img_Dos_Botão/familia.png" alt="Fase Família" class="fase-image">
        <div class="fase-title">Família em Libras</div>
        <div class="fase-count">10 questões</div>
      </a>

      <a href="meses.html" class="fase-card">
        <img src="../Imagens/Img_Dos_Botão/meses.png" alt="Fase Meses" class="fase-image">
        <div class="fase-title">Meses em Libras</div>
        <div class="fase-count">12 questões</div>
      </a>

      <a href="dias.html" class="fase-card">
        <img src="../Imagens/Img_Dos_Botão/semana.png" alt="Fase Dias da Semana" class="fase-image">
        <div class="fase-title">Dias da Semana</div>
        <div class="fase-count">7 questões</div>
      </a>
    </div>
  </div>

  <script>
  const body = document.body;

  // Verifica se já existe um tema salvo no localStorage
  if (localStorage.getItem("theme") === "light") {
    body.classList.remove("dark-mode");
  } else {
    body.classList.add("dark-mode");
  }
</script>

</body>
</html>
