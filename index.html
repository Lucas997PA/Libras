<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Menu Inicial - Jogo de Libras</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body class="dark-mode">
  <div class="menu-principal-container">
    <div class="menu-content">
      <h1 class="menu-title">Bem-vindo ao Jogo de Libras</h1>
      <p class="menu-subtitle">Aprenda Libras de forma divertida!</p>

      <div class="botoes-menu-principal">
        <a href="html/jogo.html" class="menu-button-principal primary">
          <span class="button-icon">🎮</span>
          <span class="button-text">Jogar</span>
        </a>
        <a href="html/Historia_Libras.html" class="menu-button-principal">
          <span class="button-icon">📘</span>
          <span class="button-text">História sobre a Libras</span>
        </a>
        <a href="html/EstudarLibras.html" class="menu-button-principal">
          <span class="button-icon">💡</span>
          <span class="button-text">Estudar Libras</span>
        </a>
        <a id="toggle-theme" class="menu-button-principal">
          <span class="button-icon">⚙️</span>
          <span class="button-text" id="toggle-text">Modo Claro</span>
        </a>
        <a href="html/QRCode.html" class="menu-button-principal">
          <span class="button-icon">📢</span>
          <span class="button-text">Compartilhar</span>
        </a>
      </div>
    </div>
  </div>


  <script>
  const toggleButton = document.getElementById("toggle-theme");
  const toggleText = document.getElementById("toggle-text");
  const body = document.body;

  // Verifica se já existe um tema salvo no localStorage
  if (localStorage.getItem("theme") === "light") {
    body.classList.remove("dark-mode");
    toggleText.textContent = "Modo Escuro";
  } else {
    body.classList.add("dark-mode");
    toggleText.textContent = "Modo Claro";
  }

  toggleButton.addEventListener("click", () => {
    body.classList.toggle("dark-mode");

    if (body.classList.contains("dark-mode")) {
      toggleText.textContent = "Modo Claro";
      localStorage.setItem("theme", "dark");
    } else {
      toggleText.textContent = "Modo Escuro";
      localStorage.setItem("theme", "light");
    }
  });
</script>

</body>
</html>
